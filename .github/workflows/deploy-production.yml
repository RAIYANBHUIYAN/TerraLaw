name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate-postgres:
    name: Migrate PostgreSQL (Neon)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install psycopg[binary] python-dotenv

      - name: Apply schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Skip: DATABASE_URL secret not configured"
            exit 0
          fi
          python scripts/setup_postgres.py

  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    needs: [migrate-postgres]
    if: always()
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Skip: RENDER_DEPLOY_HOOK_URL secret not configured"
            echo "Enable auto-deploy in Render dashboard or add the deploy hook URL as a GitHub secret."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Skip: Vercel secrets not configured"
            echo "Connect the repo in Vercel dashboard for automatic deploys, or add VERCEL_* secrets."
            exit 0
          fi
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --token "$VERCEL_TOKEN"
